name: preview.patchwork.inkandswitch.com

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [core-main, base-main]
  workflow_dispatch:

concurrency:
  group: patchwork-preview
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preview:
    name: preview.patchwork.inkandswitch.com
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          path: site

      - uses: actions/checkout@v7
        with:
          repository: inkandswitch/patchwork-next
          ref: main
          path: core

      - uses: pnpm/action-setup@v4
        with:
          run_install: false
          version: 11.15.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            site/pnpm-lock.yaml
            core/pnpm-lock.yaml

      - name: build core
        working-directory: core
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @inkandswitch/patchwork... build

      - name: build site
        working-directory: site
        env:
          PATCHWORK_CORE_DIR: ${{ github.workspace }}/core
          PATCHWORK_FAVICON: public/patchwork-preview.svg
          PATCHWORK_SYSTEM_PACKAGE_LIST_URL: https://base.pkg.patchwork.inkandswitch.com/modules.json
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: deploy
        working-directory: site
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.PREVIEW_NETLIFY_SITE_ID }}
        run: pnpm --package=netlify-cli@23.5.1 dlx netlify deploy --prod --dir dist
